    #
    # Build and run the benchmark suite (smoke test: catches build breaks and
    # runtime crashes/exceptions, not a performance check -- shared CI runners
    # give no timing guarantee). Excludes bench_load_balancing, which is
    # MPI-only and not built here.
    #
    #########################################################
    benchmarks:
        needs: [pre-commit, cppcheck]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ccache
                  key: ccache-benchmarks-${{ github.run_id }}
                  restore-keys: |
                      ccache-benchmarks-

            - name: Mamba and samurai env installation
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-file: conda/environment.yml
                  environment-name: samurai-env
                  cache-environment: true
                  cache-environment-key: ${{ runner.os }}-${{ hashFiles('conda/environment.yml') }}

            - name: Compiler installation
              shell: bash -l {0}
              run: |
                  micromamba install -y cxx-compiler ccache
                  ccache --max-size=2G
                  ccache --zero-stats

            - name: Configure
              shell: bash -l {0}
              run: |
                  cmake \
                      . \
                      -Bbuild \
                      -GNinja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_BENCHMARKS=ON

            - name: Build
              shell: bash -l {0}
              run: |
                  cmake --build build --target all --parallel 4

            - name: ccache statistics
              shell: bash -l {0}
              if: always()
              run: ccache --show-stats --verbose

            - name: Run benchmarks
              shell: bash -l {0}
              run: |
                  set -e
                  for exe in build/benchmark/bench_*; do
                      echo "=== $exe ==="
                      "$exe" --benchmark_min_time=0.01s
                  done
