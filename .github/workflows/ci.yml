            - name: test finite-volume-lid-driven-cavity
              shell: bash -l {0}
              run: |
                  cd build
                  set -e  # Stop on first failure
                  ./demos/FiniteVolume/finite-volume-lid-driven-cavity --min-level 3 --max-level 6

    #
    # MPI with CHECK_NAN
    #
    #########################################################
    linux-mamba-check-nan-mpi:
        needs: [pre-commit, cppcheck]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ccache
                  key: ccache-linux-mamba-check-nan-mpi-${{ github.run_id }}
                  restore-keys: |
                      ccache-linux-mamba-check-nan-mpi-

            - name: Mamba and samurai env installation
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-file: conda/mpi-environment.yml
                  environment-name: samurai-env
                  cache-environment: true
                  cache-environment-key: ${{ runner.os }}-${{ hashFiles('conda/mpi-environment.yml') }}

            - name: Petsc installation
              shell: bash -l {0}
              run: |
                  conda install -y petsc pkg-config cxx-compiler ccache
                  ccache --max-size=2G
                  ccache --zero-stats

            - name: Conda informations
              shell: bash -l {0}
              run: |
                  conda info
                  conda list

            - name: Configure
              shell: bash -l {0}
              run: |
                  cmake \
                      . \
                      -Bbuild \
                      -GNinja \
                      -DWITH_MPI=ON \
                      -DCMAKE_BUILD_TYPE=Debug \
                      -DSAMURAI_CHECK_NAN=ON \
                      -DBUILD_DEMOS=ON

            - name: Build
              shell: bash -l {0}
              run: |
                  cmake --build build --target finite-volume-advection-2d
                  cmake --build build --target finite-volume-burgers

            - name: ccache statistics
              shell: bash -l {0}
              if: always()
              run: ccache --show-stats --verbose

            - name: test finite-volume-advection-2d
              shell: bash -l {0}
              run: |
                  cd build
                  set -e  # Stop on first failure
                  mpiexec -n 1 ./demos/FiniteVolume/finite-volume-advection-2d --Tf 0.05 --nfiles 1
                  mpiexec -n 2 ./demos/FiniteVolume/finite-volume-advection-2d --Tf 0.05 --nfiles 1 --min-level 5
                  mpiexec -n 2 ./demos/FiniteVolume/finite-volume-advection-2d --Tf 0.05 --nfiles 1 --min-level 5 --load-balancing-at 10
                  # This test is failing with 3 processes due to a bug in the exchange of subdomain corners when load_balancing is activated
                  mpiexec -n 3 ./demos/FiniteVolume/finite-volume-advection-2d --Tf 0.05 --nfiles 1 --min-level 5
                  mpiexec -n 3 ./demos/FiniteVolume/finite-volume-advection-2d --Tf 0.05 --nfiles 1 --min-level 5 --load-balancing-at 10

            - name: test finite-volume-burgers
              shell: bash -l {0}
              run: |
                  cd build
                  set -e  # Stop on first failure
                  mpiexec -n 1 ./demos/FiniteVolume/finite-volume-burgers --Tf 0.1 --nfiles 1 --max-level 8
                  mpiexec -n 2 ./demos/FiniteVolume/finite-volume-burgers --Tf 0.1 --nfiles 1 --max-level 8
                  # This test is failing with 3 processes due to a bug in the exchange of subdomain corners
                  # mpiexec -n 3 ./demos/FiniteVolume/finite-volume-burgers --Tf 0.1 --nfiles 1 --max-level 8

    #
    # Compile snippets in documentation
    #
    #########################################################
    compile_snippets:
        needs: [pre-commit, cppcheck]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/ccache
                  key: ccache-compile-snippets-${{ github.run_id }}
                  restore-keys: |
                      ccache-compile-snippets-

            - name: Mamba and samurai env installation
              uses: mamba-org/setup-micromamba@v2
              with:
                  environment-file: conda/environment.yml
                  environment-name: samurai-env
                  cache-environment: true
                  cache-environment-key: ${{ runner.os }}-${{ hashFiles('conda/environment.yml') }}

            - name: Compiler installation
              shell: bash -l {0}
              run: |
                  micromamba install -y cxx-compiler ccache
                  ccache --max-size=2G
                  ccache --zero-stats

            - name: Configure
              shell: bash -l {0}
              run: |
                  cmake \
                      . \
                      -Bbuild \
                      -DBUILD_SNIPPETS=ON

            - name: Build snippets
              shell: bash -l {0}
